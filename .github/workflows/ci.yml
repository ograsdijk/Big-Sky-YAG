name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Format
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Build
        run: uv build
